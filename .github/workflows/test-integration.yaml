name: Integration Tests
on:
  push:
    branches:
      - main
  pull_request:
# Declare default permissions as read only.
permissions: read-all
jobs:
  # This is a required workflow, so it must always run and report a status.
  # We use dorny/paths-filter at the job level instead of workflow-level path filters
  # to ensure the workflow runs and the "done" job reports success even when no relevant files change.
  # This prevents PRs from being blocked by missing status checks.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - 'Makefile'
              - 'tool/**'
              - 'pkg/**'
              - 'test/**'
              - '.github/workflows/test-integration.yaml'

  test-integration-coverage:
    name: Coverage Integration Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c  # v6.1.0
        with:
          go-version-file: go.mod
      - run: make test-integration/coverage
      - uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7  # v5.5.1

  test-integration:
    name: Integration Tests (go ${{ matrix.platform.os }} ${{ matrix.platform.arch }} shard ${{ matrix.shard }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
        platform:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: amd64
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Install Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c  # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.mod"
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # ratchet:arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore otelc Go cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: test/.otelc-gocache
          key: ${{ runner.os }}-${{ matrix.platform.arch }}-otelc-gocache-shard${{ matrix.shard }}-${{ hashFiles('go.mod',
            '**/go.mod', '**/go.sum', 'Makefile', 'tool/**', 'pkg/**', 'instrumentation/**', 'test/apps/**') }}
      - name: Build and test
        env:
          GOARCH: ${{ matrix.platform.arch }}
          OTELC_TEST_GOCACHE: ${{ github.workspace }}/test/.otelc-gocache
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: "3"
        shell: bash
        run: |
          set -euo pipefail
          # grpcpb is committed, so listing tests does not need to build otelc or demo binaries.
          names=$(go -C test test -tags integration -list '^Test' ./integration/... | grep -E '^Test' | LC_ALL=C sort)

          # This shard's tests: every SHARD_TOTAL-th name, starting at SHARD_INDEX.
          shard=$(printf '%s\n' "$names" | awk -v idx="$SHARD_INDEX" -v tot="$SHARD_TOTAL" '(NR-1) % tot == idx')

          if [ -z "$shard" ]; then
            run='^$'
          else
            run="^($(printf '%s\n' "$shard" | paste -sd '|' -))$"
          fi
          echo "Shard $SHARD_INDEX/$SHARD_TOTAL -run: $run"
          INTEGRATION_TEST_RUN="$run" make test-integration

  done:
    name: Done (Integration Tests)
    runs-on: ubuntu-latest
    needs: [changes, test-integration-coverage, test-integration]
    if: always()
    steps:
      - name: Check result
        run: |
          changes_result="${{ needs.changes.result }}"
          code_changed="${{ needs.changes.outputs.code }}"
          coverage_result="${{ needs.test-integration-coverage.result }}"
          integration_result="${{ needs.test-integration.result }}"
          echo "Changes result: $changes_result"
          echo "Code changed: $code_changed"
          echo "Coverage result: $coverage_result"
          echo "Integration result: $integration_result"
          if [[ "$changes_result" != "success" ]]; then
            echo "❌ Change detection failed"
            exit 1
          fi
          if [[ "$code_changed" == "false" ]]; then
            echo "✅ No relevant code changes; tests skipped"
            exit 0
          fi
          if [[ "$code_changed" != "true" ]]; then
            echo "❌ Unexpected change detection output: $code_changed"
            exit 1
          fi
          if [[ "$coverage_result" == "success" && "$integration_result" == "success" ]]; then
            echo "✅ Tests passed"
            exit 0
          fi
          echo "❌ Tests failed"
          exit 1
